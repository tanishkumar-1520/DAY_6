<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weather-box">
            <h1>Weather Forecast</h1>

            <div class="search-box">
                <input type="text" id="city" placeholder="Search city weather...">
                <button onclick="getWeather()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <!-- Weather Info Container -->
            <div class="weather-info" id="weatherInfo" style="display: none;">
                <h2 id="cityName">---</h2>
                
                <!-- Dynamic Weather Icon -->
                <div class="icon-container">
                    <img id="weatherIcon" src="" alt="Weather Condition">
                </div>

                <h3 id="temp">0°C</h3>
                <p id="desc">---</p>
                
                <!-- 2x2 Clean Professional Grid -->
                <div class="weather-grid">
                    <div class="grid-item">
                        <i class="fa-solid fa-temperature-half"></i>
                        <div>
                            <p id="feelsLike">0°C</p>
                            <span>Feels Like</span>
                        </div>
                    </div>
                    <div class="grid-item">
                        <i class="fa-solid fa-droplet"></i>
                        <div>
                            <p id="humidity">0%</p>
                            <span>Humidity</span>
                        </div>
                    </div>
                    <div class="grid-item">
                        <i class="fa-solid fa-wind"></i>
                        <div>
                            <p id="wind">0 m/s</p>
                            <span>Wind Speed</span>
                        </div>
                    </div>
                    <div class="grid-item">
                        <i class="fa-solid fa-gauge"></i>
                        <div>
                            <p id="pressure">0 hPa</p>
                            <span>Pressure</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Error Handling -->
            <div class="error-box" id="errorBox" style="display: none;">
                <p><i class="fa-solid fa-triangle-exclamation"></i> City not found. Please try again!</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
